name: SonicDroplet
options:
  bundleIdPrefix: com.kemp144
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: bottom

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    GENERATE_INFOPLIST_FILE: false
    SWIFT_EMIT_LOC_STRINGS: "YES"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  SonicDroplet:
    type: application
    platform: macOS
    sources:
      - path: SonicDroplet
        excludes:
          - "**/*.xcstrings"
    resources:
      - path: SonicDroplet/Resources/Assets.xcassets
      # Keep the matching .pbxproj entries in source control as well.
      # XcodeGen 2.45 does not currently emit .xcstrings into the resources build phase here.
      - path: SonicDroplet/Resources/Localizable.xcstrings
      - path: SonicDroplet/Resources/InfoPlist.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kemp144.sonicdroplet
        PRODUCT_NAME: SonicDroplet
        INFOPLIST_FILE: SonicDroplet/Info.plist
        CODE_SIGN_ENTITLEMENTS: SonicDroplet/SonicDroplet.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: YES

  SonicDropletTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SonicDropletTests
    dependencies:
      - target: SonicDroplet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kemp144.sonicdroplet.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SonicDroplet.app/Contents/MacOS/SonicDroplet"
