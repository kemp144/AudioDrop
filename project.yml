name: AudioDrop
options:
  bundleIdPrefix: com.audiodrop
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: bottom

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: false
    SWIFT_EMIT_LOC_STRINGS: "YES"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  AudioDrop:
    type: application
    platform: macOS
    sources:
      - path: AudioDrop
        excludes:
          - "**/*.xcstrings"
    resources:
      - path: AudioDrop/Resources/Assets.xcassets
      - path: AudioDrop/Resources/Localizable.xcstrings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.audiodrop.app
        PRODUCT_NAME: AudioDrop
        INFOPLIST_FILE: AudioDrop/Info.plist
        CODE_SIGN_ENTITLEMENTS: AudioDrop/AudioDrop.entitlements
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: AudioDrop/AudioDrop.entitlements

  AudioDropTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AudioDropTests
    dependencies:
      - target: AudioDrop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.audiodrop.app.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AudioDrop.app/Contents/MacOS/AudioDrop"
